# ChordMind — infrastructure (stateful services).
# Start FIRST:  docker compose -f docker-compose.infra.yml up -d
# Creates the shared `chordmind` network that the app stack attaches to.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: chordmind
      POSTGRES_PASSWORD: chordmind
      POSTGRES_DB: chordmind
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    networks: [chordmind]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chordmind"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:

networks:
  chordmind:
    name: chordmind
